# Single-node kind cluster.
#
# Single node keeps hostPath PVs simple: pods always land on the only node,
# so /homelab-data is always reachable.
#
# extraMounts is injected at deploy time by `just deploy` using yq, since
# kind requires absolute hostPath values.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 80     # ingress HTTP
      - containerPort: 30443
        hostPort: 443    # ingress HTTPS
