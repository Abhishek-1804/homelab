# Single-node kind cluster.
#
# extraMounts is injected at deploy time by `just deploy` using yq since
# kind requires an absolute hostPath — resolved from $(pwd)/data at runtime.
#
# extraPortMappings expose each NodePort service on the host so they are
# reachable from other Tailscale devices without any /etc/hosts or TLS setup.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 3000  # homepage
      - containerPort: 30001
        hostPort: 3001  # grafana
      - containerPort: 30002
        hostPort: 3002  # prometheus
      - containerPort: 30003
        hostPort: 3003  # uptime-kuma
      - containerPort: 30004
        hostPort: 3004  # home-assistant
      - containerPort: 30005
        hostPort: 3005  # open-webui
      - containerPort: 30006
        hostPort: 3006  # ollama
      - containerPort: 30007
        hostPort: 3007  # n8n
      - containerPort: 30008
        hostPort: 3008  # hermes-agent
      - containerPort: 30009
        hostPort: 3009  # plex
      - containerPort: 30010
        hostPort: 3010  # jellyfin
      - containerPort: 30011
        hostPort: 3011  # nextcloud
      - containerPort: 30012
        hostPort: 3012  # immich
      - containerPort: 30013
        hostPort: 3013  # it-tools
      - containerPort: 30014
        hostPort: 3014  # libreoffice
