# Single-node kind cluster.
#
# Single node keeps hostPath PVs simple: pods always land on the only node,
# so /homelab-data is always reachable.
#
# extraMounts and extraPortMappings are injected at deploy time by `just deploy`
# using yq. extraPortMappings are auto-generated from NodePort values in manifests/
# so kind-config.yaml never needs to be edited when adding new services.
#
# Path inside kind node: /homelab-data/<service>
# Path on host:          ./data/<service>
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
