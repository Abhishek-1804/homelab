apiVersion: v1
kind: Namespace
metadata:
  name: ai
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-qwen
  namespace: ai
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-ollama
          image: busybox
          command: ["sh", "-c", "until wget -qO- http://ollama.ai.svc.cluster.local:80; do echo waiting for ollama; sleep 3; done"]
      containers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["ollama", "pull", "qwen3.5:2b"]
          env:
            - name: OLLAMA_HOST
              value: "http://ollama.ai.svc.cluster.local:80"
      restartPolicy: OnFailure
