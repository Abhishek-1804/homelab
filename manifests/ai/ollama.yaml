apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: ollama-pv
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "4Gi"
              cpu: "4000m"
            limits:
              memory: "6Gi"
              cpu: "6000m"
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
spec:
  selector:
    app: ollama
  type: NodePort
  ports:
    - port: 80
      targetPort: 11434
      nodePort: 30006
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-gemma4-31b-cloud
  namespace: ai
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: ollama/ollama:latest
          env:
            - name: OLLAMA_HOST
              value: "http://ollama.ai.svc.cluster.local:80"
          command:
            - sh
            - -c
            - |
              until ollama list 2>/dev/null; do
                echo "waiting for ollama..."; sleep 3
              done
              ollama pull gemma4:31b-cloud
