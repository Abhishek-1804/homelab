apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: ai
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: ollama-pv
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "4Gi"
              cpu: "4000m"
            limits:
              memory: "6Gi"
              cpu: "6000m"
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai
spec:
  selector:
    app: ollama
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 11434
---
# Pulls the default model after Ollama is ready.
# ollama pull is idempotent — skips download if model already exists on the PVC.
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-qwen
  namespace: ai
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-ollama
          image: busybox
          command: ["sh", "-c", "until wget -qO- http://ollama.ai.svc.cluster.local:80; do echo waiting for ollama; sleep 3; done"]
      containers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["ollama", "pull", "qwen3.5:0.8b"]
          env:
            - name: OLLAMA_HOST
              value: "http://ollama.ai.svc.cluster.local:80"
      restartPolicy: OnFailure
