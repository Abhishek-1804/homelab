apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-tools
  namespace: it
spec:
  replicas: 1
  selector:
    matchLabels:
      app: it-tools
  template:
    metadata:
      labels:
        app: it-tools
    spec:
      containers:
        - name: it-tools
          image: corentinth/it-tools:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: it-tools
  namespace: it
spec:
  selector:
    app: it-tools
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
