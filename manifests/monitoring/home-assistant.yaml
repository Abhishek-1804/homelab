apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: home-assistant-pv
  resources:
    requests:
      storage: 8Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      initContainers:
        - name: init-config
          image: busybox
          command:
            - sh
            - -c
            - |
              if ! grep -q "use_x_forwarded_for" /config/configuration.yaml 2>/dev/null; then
                cat >> /config/configuration.yaml << 'EOF'

              # 0.0.0.0/0 trusts all proxies — safe for a local cluster with no
              # external access. On a real k8s installation, replace with the actual
              # ingress-nginx pod CIDR (e.g. 10.244.0.0/16) to avoid spoofing risks.
              http:
                use_x_forwarded_for: true
                trusted_proxies:
                  - 0.0.0.0/0
              EOF
              fi
          volumeMounts:
            - name: data
              mountPath: /config
      containers:
        - name: home-assistant
          image: homeassistant/home-assistant
          ports:
            - containerPort: 8123
          volumeMounts:
            - name: data
              mountPath: /config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-data
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: monitoring
spec:
  selector:
    app: home-assistant
  type: NodePort
  ports:
    - port: 80
      targetPort: 8123
      nodePort: 30004
