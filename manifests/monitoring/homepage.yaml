apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: monitoring
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    headerStyle: clean

  services.yaml: |
    - Monitoring:
        - Grafana:
            href: http://100.122.254.107:3001
            description: Metrics visualization
            icon: grafana.png
        - Home Assistant:
            href: http://100.122.254.107:3004
            description: Home automation
            icon: home-assistant.png
        - Prometheus:
            href: http://100.122.254.107:3002
            description: Metrics collection
            icon: prometheus.png
        - Uptime Kuma:
            href: http://100.122.254.107:3003
            description: Uptime monitoring
            icon: uptime-kuma.png
    - AI:
        - Open WebUI:
            href: http://100.122.254.107:3005
            description: Chat interface for Ollama
            icon: openai.png
        - n8n:
            href: http://100.122.254.107:3007
            description: Workflow automation
            icon: n8n.png
        - Ollama:
            href: http://100.122.254.107:3006
            description: LLM inference
            icon: ollama.png
        - Hermes Agent:
            href: http://100.122.254.107:3008
            description: Autonomous AI agent
            icon: https://avatars.githubusercontent.com/u/103061224
    - IT Tools:
        - IT Tools:
            href: http://100.122.254.107:3013
            description: Developer utilities
            icon: it-tools.png
        - LibreOffice:
            href: http://100.122.254.107:3014
            description: Office suite
            icon: libreoffice.png
    - Science:
        - Folding@home:
            href: http://100.122.254.107:3015
            description: Protein-folding research
            icon: https://foldingathome.org/wp-content/uploads/2021/06/cropped-fah-logo-512-192x192.png
    - Media:
        - Nextcloud:
            href: http://100.122.254.107:3011
            description: File storage and sharing
            icon: nextcloud.png
        - Plex:
            href: http://100.122.254.107:3009
            description: Media streaming
            icon: plex.png
        - Jellyfin:
            href: http://100.122.254.107:3010
            description: Media streaming
            icon: jellyfin.png
        - Immich:
            href: http://100.122.254.107:3012
            description: Photo and video management
            icon: immich.png

  widgets.yaml: |
    - search:
        provider: duckduckgo
        target: _blank

  bookmarks.yaml: |
    []

  kubernetes.yaml: |
    mode: disabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
          volumeMounts:
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: monitoring
spec:
  selector:
    app: homepage
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000
