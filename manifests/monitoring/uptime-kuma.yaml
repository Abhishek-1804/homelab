apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uptime-kuma-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: uptime-kuma-pv
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: louislam/uptime-kuma:latest
          ports:
            - containerPort: 3001
          env:
            - name: UPTIME_KUMA_DISABLE_AUTH
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma-data
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  selector:
    app: uptime-kuma
  type: NodePort
  ports:
    - port: 80
      targetPort: 3001
      nodePort: 30003
---
# AutoKuma declaratively provisions the monitors below into Uptime Kuma via its
# socket.io API (auth disabled on that side), so monitors are code and survive a
# fresh kuma.db / cluster rebuild. It retries until the uptime-kuma pod is up.
apiVersion: v1
kind: ConfigMap
metadata:
  name: autokuma-monitors
  namespace: monitoring
data:
  monitors.toml: |
    # one HTTP monitor per user-facing service, targeting in-cluster DNS

    [homepage]
    type = "http"
    name = "Homepage"
    url = "http://homepage.monitoring.svc.cluster.local:80"
    interval = 60

    [grafana]
    type = "http"
    name = "Grafana"
    url = "http://grafana.monitoring.svc.cluster.local:80"
    interval = 60

    [prometheus]
    type = "http"
    name = "Prometheus"
    url = "http://prometheus.monitoring.svc.cluster.local:9090/-/healthy"
    interval = 60

    [home-assistant]
    type = "http"
    name = "Home Assistant"
    url = "http://home-assistant.monitoring.svc.cluster.local:80"
    interval = 60

    [open-webui]
    type = "http"
    name = "Open WebUI"
    url = "http://open-webui.ai.svc.cluster.local:80"
    interval = 60

    [ollama]
    type = "http"
    name = "Ollama"
    url = "http://ollama.ai.svc.cluster.local:80"
    interval = 60

    [n8n]
    type = "http"
    name = "n8n"
    url = "http://n8n.ai.svc.cluster.local:80"
    interval = 60

    [hermes-agent]
    type = "http"
    name = "Hermes Agent"
    url = "http://hermes-agent.ai.svc.cluster.local:9119"
    interval = 60

    [plex]
    type = "http"
    name = "Plex"
    url = "http://plex.media.svc.cluster.local:80/identity"
    interval = 60

    [jellyfin]
    type = "http"
    name = "Jellyfin"
    url = "http://jellyfin.media.svc.cluster.local:80/health"
    interval = 60

    [nextcloud]
    type = "http"
    name = "Nextcloud"
    url = "http://nextcloud.media.svc.cluster.local:80/status.php"
    interval = 60

    [immich]
    type = "http"
    name = "Immich"
    url = "http://immich-server.media.svc.cluster.local:80/api/server/ping"
    interval = 60

    [it-tools]
    type = "http"
    name = "IT Tools"
    url = "http://it-tools.it.svc.cluster.local:80"
    interval = 60

    [libreoffice]
    type = "http"
    name = "LibreOffice"
    url = "http://libreoffice.it.svc.cluster.local:80"
    interval = 60

    [foldingathome]
    type = "http"
    name = "Folding@home"
    url = "http://foldingathome.science.svc.cluster.local:80"
    interval = 60
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autokuma
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autokuma
  template:
    metadata:
      labels:
        app: autokuma
    spec:
      containers:
        - name: autokuma
          image: ghcr.io/bigboot/autokuma:latest
          env:
            - name: AUTOKUMA__KUMA__URL
              value: "http://uptime-kuma.monitoring.svc.cluster.local:80"
            - name: AUTOKUMA__STATIC_MONITORS
              value: "/monitors"
          volumeMounts:
            - name: monitors
              mountPath: /monitors
      volumes:
        - name: monitors
          configMap:
            name: autokuma-monitors
