apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: plex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: plexinc/pms-docker:latest
          ports:
            - containerPort: 32400
---
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: plex
spec:
  selector:
    app: plex
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 32400
---
apiVersion: v1
kind: Service
metadata:
  name: plex-nodeport
  namespace: plex
spec:
  selector:
    app: plex
  type: NodePort
  ports:
    - port: 32400
      targetPort: 32400
      nodePort: 30032
      protocol: TCP
