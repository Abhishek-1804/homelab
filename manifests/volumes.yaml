# Static PersistentVolumes with fixed hostPaths.
# Each PV maps to a named subdirectory under ./data/ on the host Mac via kind's extraMounts.
# Using static PVs means the same directory is reused on every rebuild — data survives
# cluster destruction and recreation.
#
# Path inside kind node: /homelab-data/<service>
# Path on your Mac:      ./data/<service>
#
# To wipe all data:             rm -rf ./data/*
# To wipe a single service:     rm -rf ./data/<service>
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /homelab-data/ollama
